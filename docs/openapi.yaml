components:
  securitySchemes:
    sessionBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        User session token returned by `POST /api/v1/auth/login`. Send as
        `Authorization: Bearer <token>`.
    adminApiKey:
      type: apiKey
      in: header
      name: X-Kelompok-Admin-Key
      description: |
        Operations fallback admin key (`KELOMPOK_ADMIN_API_KEY`). When
        `KELOMPOK_ADMIN_ORGANIZATION_SLUGS` is set, the key is restricted to
        those slugs and cannot use global list routes without an
        `organization_slug` filter.

  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: |
        Maximum number of items to return. Each endpoint clamps this value to
        a per-route maximum (typically 100). Invalid values fall back to the
        endpoint's default.
      schema:
        type: integer
        minimum: 1
        maximum: 100
    OrganizationSlug:
      name: slug
      in: path
      required: true
      description: Organization slug.
      schema:
        type: string
    PostSlug:
      name: post_slug
      in: path
      required: true
      description: Post slug.
      schema:
        type: string
    RelationshipID:
      name: id
      in: path
      required: true
      description: Organization relationship UUID.
      schema:
        type: string
        format: uuid
    ClaimID:
      name: id
      in: path
      required: true
      description: Claim request UUID.
      schema:
        type: string
        format: uuid
    MemberID:
      name: id
      in: path
      required: true
      description: Member UUID.
      schema:
        type: string
        format: uuid
    PostID:
      name: id
      in: path
      required: true
      description: Post UUID.
      schema:
        type: string
        format: uuid
    ImpactReportID:
      name: id
      in: path
      required: true
      description: Impact report UUID.
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Request payload is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    OrganizationNotFound:
      description: Organization not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SessionRequired:
      description: A user session is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AdminAuthRequired:
      description: Admin authorization is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AdminAuthNotConfigured:
      description: Admin API key is not configured on this deployment.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AdminOrgForbidden:
      description: The caller is not authorized for this organization.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AdminOrgScopeRequired:
      description: |
        The caller must use an organization-scoped route or include an
        `organization_slug` filter.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    SuccessEnvelope:
      type: object
      required: [data, message]
      properties:
        data:
          description: Endpoint-specific payload.
        meta:
          $ref: "#/components/schemas/PageMeta"
        message:
          type: string
          description: Stable status string. `"ok"` on success.
          example: ok

    PageMeta:
      type: object
      properties:
        count:
          type: integer
          description: Number of items returned in this response.
        limit:
          type: integer
          description: Limit applied to the underlying query.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable error code.
              example: organization_not_found
            message:
              type: string
              description: Human-readable error message.
              example: Organization not found
            details:
              type: object
              additionalProperties: true
              nullable: true

    OrganizationRef:
      type: object
      required: [slug, name]
      properties:
        slug:
          type: string
        name:
          type: string

    PublicOrganizationRelationship:
      type: object
      required: [organization, relationship_type, status]
      properties:
        organization:
          $ref: "#/components/schemas/OrganizationRef"
        relationship_type:
          type: string
          enum:
            - structural_parent
            - autonomous_body
            - affiliated_with
            - network_member
            - related
        label:
          type: string
        status:
          type: string
          enum: [active, pending, inactive, archived]

    PublicOrganizationRelationships:
      type: object
      required: [parents, children, related]
      properties:
        parents:
          type: array
          items:
            $ref: "#/components/schemas/PublicOrganizationRelationship"
        children:
          type: array
          items:
            $ref: "#/components/schemas/PublicOrganizationRelationship"
        related:
          type: array
          items:
            $ref: "#/components/schemas/PublicOrganizationRelationship"

    PublicOrganization:
      type: object
      required: [slug, name, claim_status, profile_data, sdgs_data, impact_data, created_at, updated_at]
      properties:
        slug:
          type: string
        name:
          type: string
        legal_name:
          type: string
        description:
          type: string
        history:
          type: string
        country:
          type: string
        region:
          type: string
        city:
          type: string
        website_url:
          type: string
        claim_status:
          type: string
          enum: [unclaimed, pending, claimed, rejected]
        profile_data:
          type: object
          additionalProperties: true
          description: Filtered public profile fields. Internal keys are stripped.
        sdgs_data:
          type: object
          additionalProperties: true
        impact_data:
          type: object
          additionalProperties: true
        relationships:
          $ref: "#/components/schemas/PublicOrganizationRelationships"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PublicPost:
      type: object
      required: [organization, slug, title, status, post_data, seo_data, created_at, updated_at]
      properties:
        organization:
          $ref: "#/components/schemas/OrganizationRef"
        category_slug:
          type: string
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        post_data:
          type: object
          additionalProperties: true
        seo_data:
          type: object
          additionalProperties: true
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PublicImpactReport:
      type: object
      required: [organization, title, status, sdgs, metrics, created_at, updated_at]
      properties:
        organization:
          $ref: "#/components/schemas/OrganizationRef"
        title:
          type: string
        summary:
          type: string
        report_period_start:
          type: string
          format: date-time
          nullable: true
        report_period_end:
          type: string
          format: date-time
          nullable: true
        sdgs:
          type: array
          items: {}
        metrics:
          type: object
          additionalProperties: true
        status:
          type: string
          enum: [draft, published, archived]
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ServiceBannerResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [service, tagline]
              properties:
                service:
                  type: string
                  example: kelompok-api
                tagline:
                  type: string

    HealthResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [status, env]
              properties:
                status:
                  type: string
                  example: ok
                env:
                  type: string

    ReadyResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  example: ready

    PublicOrganizationListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PublicOrganization"

    PublicOrganizationDetailResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PublicOrganization"

    PublicPostListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PublicPost"

    PublicPostDetailResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/PublicPost"

    PublicImpactReportListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/PublicImpactReport"

    ClaimInput:
      type: object
      required: [method, target]
      properties:
        method:
          type: string
          enum: [official_email, instagram]
        target:
          type: string
          description: Email address or Instagram handle.
        requester_email:
          type: string
          format: email
          description: Falls back to `target` when omitted.
        evidence:
          type: object
          additionalProperties: true

    ClaimRequest:
      type: object
      required: [id, organization_id, user_id, method, target, status, evidence, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        method:
          type: string
          enum: [official_email, instagram]
        target:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        evidence:
          type: object
          additionalProperties: true
        reviewed_by_user_id:
          type: string
          format: uuid
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ClaimRequestResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ClaimRequest"

    ClaimListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ClaimRequest"

    RegisterInput:
      type: object
      required: [email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    User:
      type: object
      required: [id, name, email, role, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [viewer, member, admin, owner, superadmin]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"

    UpdateProfileInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120

    Session:
      type: object
      required: [token, expires_at, user]
      properties:
        token:
          type: string
        expires_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"

    SessionResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Session"

    LogoutResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [revoked]
              properties:
                revoked:
                  type: boolean
                  example: true

    OrganizationRole:
      type: object
      required: [organization_id, organization_slug, organization_name, role, created_at, updated_at]
      properties:
        organization_id:
          type: string
          format: uuid
        organization_slug:
          type: string
        organization_name:
          type: string
        role:
          type: string
          enum: [owner, admin, member, viewer]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    MeResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: object
              required: [user, organization_roles]
              properties:
                user:
                  $ref: "#/components/schemas/User"
                organization_roles:
                  type: array
                  items:
                    $ref: "#/components/schemas/OrganizationRole"

    AdminOrganization:
      type: object
      required: [id, slug, name, claim_status, profile_data, sdgs_data, impact_data, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        legal_name:
          type: string
        description:
          type: string
        history:
          type: string
        country:
          type: string
        region:
          type: string
        city:
          type: string
        website_url:
          type: string
        official_email:
          type: string
          format: email
        claim_status:
          type: string
          enum: [unclaimed, pending, claimed, rejected]
        profile_data:
          type: object
          additionalProperties: true
        sdgs_data:
          type: object
          additionalProperties: true
        impact_data:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AdminOrganizationInput:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        legal_name:
          type: string
        description:
          type: string
        history:
          type: string
        country:
          type: string
        region:
          type: string
        city:
          type: string
        website_url:
          type: string
        official_email:
          type: string
          format: email
        claim_status:
          type: string
          enum: [unclaimed, pending, claimed, rejected]
        profile_data:
          type: object
          additionalProperties: true
        sdgs_data:
          type: object
          additionalProperties: true
        impact_data:
          type: object
          additionalProperties: true
      required: [name]

    AdminOrganizationResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AdminOrganization"

    AdminOrganizationListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/AdminOrganization"

    Relationship:
      type: object
      required: [id, parent, child, relationship_type, status, metadata, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
